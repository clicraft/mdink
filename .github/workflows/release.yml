name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Generate man page and shell completions (once, platform-independent) ──
  assets:
    name: Generate dist assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run cargo xtask dist-assets
        run: cargo xtask dist-assets

      - uses: actions/upload-artifact@v4
        with:
          name: dist-assets
          path: |
            assets/mdink.1.gz
            assets/completions/
          retention-days: 1

  # ── Binary archives (tar.gz / zip) ────────────────────────────────
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: mdink-linux-x86_64.tar.gz

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: mdink-linux-aarch64.tar.gz
            cross_linker: gcc-aarch64-linux-gnu

          - os: macos-latest
            target: x86_64-apple-darwin
            archive: mdink-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            archive: mdink-macos-aarch64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: mdink-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux aarch64 needs a cross-linker; all other targets build natively.
      - name: Install cross-linker (aarch64 Linux only)
        if: matrix.cross_linker != ''
        run: |
          sudo apt-get update -q
          sudo apt-get install -y "$CROSS_LINKER"
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' \
            >> ~/.cargo/config.toml
        env:
          CROSS_LINKER: ${{ matrix.cross_linker }}

      - name: Build
        shell: bash
        run: cargo build --profile dist --target "$TARGET"
        env:
          TARGET: ${{ matrix.target }}

      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: tar czf "$ARCHIVE" -C "target/$TARGET/dist" mdink
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/$env:TARGET/dist/mdink.exe" `
            -DestinationPath "$env:ARCHIVE"
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 1

  # ── Debian package (.deb) ─────────────────────────────────────────
  deb:
    name: .deb package
    runs-on: ubuntu-latest
    needs: assets
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download dist assets
        uses: actions/download-artifact@v4
        with:
          name: dist-assets
          path: assets

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build .deb
        run: cargo deb

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: target/debian/*.deb
          retention-days: 1

  # ── GitHub Release (draft, attach all assets) ──────────────────────
  release:
    name: Create GitHub Release
    needs: [build, deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: List assets
        run: ls -lh dist/

      # Checksums let install.sh verify downloads (fail-closed against tampered
      # or MITM'd release assets). Filenames in SHA256SUMS are bare (no path)
      # because we hash from inside dist/, which is what the installer expects.
      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum *.tar.gz *.zip *.deb > SHA256SUMS
          cat SHA256SUMS

      # Sign SHA256SUMS with minisign so install.sh can verify release
      # authenticity against its pinned public key. The secret key lives in the
      # MINISIGN_SECRET_KEY repo secret; MINISIGN_PASSWORD may be empty if the
      # key was generated passwordless (`minisign -G -W`). Produces
      # SHA256SUMS.minisig. Fails the release if the signing secret is missing.
      - name: Sign SHA256SUMS (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "error: MINISIGN_SECRET_KEY secret is not set — cannot sign release" >&2
            exit 1
          fi
          sudo apt-get update -q && sudo apt-get install -y minisign
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > "$RUNNER_TEMP/minisign.key"
          printf '%s' "$MINISIGN_PASSWORD" | minisign -S \
            -s "$RUNNER_TEMP/minisign.key" \
            -m dist/SHA256SUMS \
            -t "mdink ${GITHUB_REF_NAME} checksums"
          rm -f "$RUNNER_TEMP/minisign.key"
          cat dist/SHA256SUMS.minisig

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/SHA256SUMS
            dist/SHA256SUMS.minisig
